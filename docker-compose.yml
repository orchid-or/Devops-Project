services:
  deployment-tracker:
    build:
      context: ./artifacts/deployment-tracker
      dockerfile: Dockerfile
    container_name: deployment-tracker
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/').read()\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
